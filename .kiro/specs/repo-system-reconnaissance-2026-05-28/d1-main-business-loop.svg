<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" role="img" aria-labelledby="d1-title d1-desc">
  <title id="d1-title">Main Business Loop — Mission Execution chain</title>
  <desc id="d1-desc">Eight-stage sequence diagram of the canonical Main_Business_Loop selected by Stage 4: User/Feishu hits POST /api/tasks, MissionStore creates the Mission, MissionOrchestrator starts it, ExecutionPlanBuilder builds the plan, ExecutorClient dispatches to the Docker executor, the executor calls back via /api/executor/events with HMAC, MissionStore updates and emits a socket mission_event consumed by the frontend cockpit, and FeishuProgressBridge mirrors the result back to the Feishu thread. Audit chain and lineage DAG attach as overlays.</desc>

