      .sm{font:700 11px "Microsoft YaHei","PingFang SC",sans-serif;fill:#475569}
      .mono{font:800 11px Consolas,"Microsoft YaHei",monospace;fill:#0f172a}
      .pct{font:900 13px Consolas,monospace;fill:#059669}
      .pct-warn{font:900 13px Consolas,monospace;fill:#d97706}
      .card{rx:18;filter:url(#shadow)}
