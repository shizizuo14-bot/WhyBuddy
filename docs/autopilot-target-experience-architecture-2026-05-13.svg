    <text class="sub" y="32">2026-05-13 更新 · 整体完成度 ~83% · Step 2/3/5 均为伴随式横切层</text>
    <text class="mono" y="58">关键修正：Step 2 与 Step 3 不属于某一个环节，而是伴随整流程，RouteSet、SPEC、文档、预演、提示词与工程落地的全流程横向能力层。</text>
  </g>

