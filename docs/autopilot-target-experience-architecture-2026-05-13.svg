<svg xmlns="http://www.w3.org/2000/svg" width="1840" height="1540" viewBox="0 0 1840 1540" role="img" aria-labelledby="title desc">
  <title id="title">/autopilot 整体目标架构图（全流程伴随版）— 2026-05-13 更新</title>
  <desc id="desc">展示 SPEC-first 自动驾驶闭环：伴随式 Agent Crew + 角色能力网络 + 3D 运行台观察层 + 核心资产链 + 统一事件流。标注 2026-05-13 各层完成度。</desc>
  <defs>
