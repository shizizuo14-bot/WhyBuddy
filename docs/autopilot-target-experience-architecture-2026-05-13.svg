      .dash{stroke-dasharray:7 7}
      .pill{font:900 10px "Microsoft YaHei","PingFang SC",sans-serif}
      .done{fill:#dcfce7;stroke:#86efac}
      .prog{fill:#fef3c7;stroke:#fbbf24}
