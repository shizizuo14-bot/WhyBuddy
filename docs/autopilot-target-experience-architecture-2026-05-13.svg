      .sub{font:700 15px "Microsoft YaHei","PingFang SC",sans-serif;fill:#475569}
      .kick{font:900 11px "Microsoft YaHei","PingFang SC",sans-serif;fill:#64748b;letter-spacing:1px}
      .sec{font:900 20px "Microsoft YaHei","PingFang SC",sans-serif;fill:#0f172a}
