<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1680 1240" font-family="'Inter','SF Pro Text','Helvetica Neue',Arial,sans-serif">
  <!-- ================== styles ================== -->
  <defs>
    <style>
