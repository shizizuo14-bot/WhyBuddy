<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1840" height="1440" viewBox="0 0 1840 1440" role="img" aria-labelledby="title desc">
  <title id="title">/autopilot 整体流程闭环进度总览 v11</title>
