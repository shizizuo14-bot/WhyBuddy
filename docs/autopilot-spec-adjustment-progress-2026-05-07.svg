  <text x="60" y="118" class="hero-sub">主口径：按目标体验架构图执行后的端到端流程，不再只看文档同步或单个 tasks.md 口径。</text>
  <text x="60" y="150" class="hero-sub">从输入和 LLM 澄清，到 RouteSet、Runtime Capability、Agent Crew、SPEC、预演、提示词交接与 Artifact Replay，整体流程已跑通并收口。</text>
  <text x="60" y="182" class="hero-sub">旁证：8 份 target spec 的 249 个任务点已全部勾选完成；blueprint 目标测试 51/51 通过；项目内 LLM smoke 已验证可用。</text>

