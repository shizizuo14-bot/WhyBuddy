<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentLoop Dashboard</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; background: #f8f9fa; color: #111; }
    h1 { margin-bottom: 0.5rem; }
    .nav { display: flex; gap: 0.5rem; margin: 0.75rem 0 1rem; flex-wrap: wrap; }
    .nav a { text-decoration: none; padding: 0.25rem 0.6rem; border: 1px solid #ccc; border-radius: 3px; color: #333; background: #fff; font-size: 0.9rem; }
    .nav a.active { background: #0066cc; color: #fff; border-color: #0066cc; font-weight: 500; }
    .nav a.back { border-style: dashed; }
    #status { margin: 0.5rem 0; font-size: 0.9rem; }
    #runs ul { list-style: none; padding: 0; }
    #runs li { padding: 0.4rem 0.6rem; margin: 0.25rem 0; background: white; border: 1px solid #ddd; border-radius: 4px; }
    .empty { color: #666; font-style: italic; }
    .error { color: #c00; padding: 0.5rem; border: 1px solid #fcc; background: #fff0f0; }
    button { padding: 0.3rem 0.6rem; }
    .view { display: none; }
    .view.active { display: block; }
  </style>
</head>
<body>
  <h1>AgentLoop Dashboard</h1>
  <nav class="nav" id="nav-shell">
    <a href="#workbench" data-nav="workbench">Workbench</a>
    <a href="#runs" data-nav="runs">Runs</a>
    <a href="#settings" data-nav="settings">Settings</a>
    <a href="/" data-nav="sliderule" class="back">SlideRule</a>
  </nav>
  <div id="views">
    <section id="workbench" class="view">
      <p>Workbench (placeholder).</p>
    </section>
    <section id="runs" class="view">
      <!-- shell fetches /api/agent-loop/runs/overview (documented overview endpoint); detail prefers /snapshot event replay (110) -->
      <p>Python-served shell (initial port)</p>
      <button onclick="loadRuns()">Refresh</button>
      <div id="status"></div>
      <div id="runs"></div>
    </section>
    <section id="settings" class="view">
      <p>Settings (placeholder).</p>
    </section>
    <section id="detail" class="view">
      <a href="#runs" class="back" data-detail-back>&larr; Back to Runs</a>
      <h2>Run Detail <span id="detail-id"></span></h2>
      <div id="detail-status"></div>
      <div id="detail-body">
        <div id="flow" class="detail-section"><h3>Flow</h3><div class="flow-body"></div></div>
        <div id="timeline" class="detail-section"><h3>Timeline</h3><div class="timeline-body"></div></div>
        <div id="review" class="detail-section"><h3>Review</h3><div class="review-body"></div></div>
        <div id="diff" class="detail-section"><h3>Diff</h3><div class="diff-body"></div></div>
        <div id="agent-output" class="detail-section"><h3>Agent Output</h3><div class="output-body"></div></div>
        <div id="artifacts" class="detail-section"><h3>Artifacts</h3><div class="artifacts-body"></div></div>
      </div>
    </section>
  </div>

  <script src="/api/agent-loop/agent-loop-dashboard.js"></script>
</body>
</html>
